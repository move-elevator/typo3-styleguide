<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<div style="display:flex;flex-wrap:wrap;">
    <f:for each="{children}" as="child">
        <div style="display:inline-flex;align-items:center;margin:0 12px 6px 0;">
            <span style="display:inline-block;width:20px;height:20px;border-radius:4px;background:{child.color};border:1px solid rgba(0,0,0,.15);flex-shrink:0;"></span>
            <span style="margin-left:6px;font-size:11px;line-height:1.2;">
                {child.color}<f:if condition="{child.label}"><br/><span style="color:#666;">{child.label}</span></f:if>
            </span>
        </div>
    </f:for>
</div>
</html>
